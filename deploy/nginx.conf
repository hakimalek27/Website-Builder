# Contoh nginx untuk REKA (produksi) — §11.5.
# Sesuaikan server_name, sijil SSL, dan laluan root.

server {
    listen 80;
    server_name reka.example.my;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name reka.example.my;

    root /var/www/reka/public;
    index index.php;

    ssl_certificate     /etc/letsencrypt/live/reka.example.my/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reka.example.my/privkey.pem;

    # HSTS (§11.3 — HHSTS diuruskan di nginx, bukan middleware app).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 12M; # muat naik hero/pdf (§11.4)

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Jangan hidangkan storage app secara langsung (fail sensitif di luar public).
    location ~ /\.(?!well-known).* { deny all; }
}
